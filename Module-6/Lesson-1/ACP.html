<!DOCTYPE html>
<html>
    <head></head>
    <body>
        <script>
           var choice=prompt("Welcome to the perimeter calculator! \nPlease select the shape whose perimeter you want to determine. \n1.Square \n2.Rectangle \n3.Triangle \n4.Circle \n5.Rhombus") 
           if (choice==1){
            var length= prompt("Please enter the length of each side of the square")
            var perimeter= 4*length;

            alert("The perimeter of the square is: "+ perimeter)
             }
             else if(choice==2){
                var length = prompt("Please enter the length of the rectangle")
                var width = prompt("Please enter the width of the rectangle")
               var perimeter = 2*length+2*width;

               alert("The perimeter of the rectangle is:"+perimeter)

             }
             else if (choice == 3) {
               var side = prompt("Please enter the length of one side of the triangle")
               var base = prompt("Please enter the base of the triangle")
               var side1 = prompt("Please enter the length of the other side of the triangle")
               var perimeter=add(side+base+side1)

               alert("The perimeter of the triangle is:" + perimeter)
             }

             else if (choice == 4) {
               var radius = prompt("Please enter the radius of the circle")
               var perimeter = 2*3.14*radius

               alert("The perimeter of the circle is:" + perimeter)
           }

           else if (choice == 5) {
                var length = prompt("Please enter the length of each side of the rhombus")
                var perimeter = 4 * length;

                alert("The perimeter of the rhombus is: " + perimeter)
            }
            else{
            alert("Invalid! Please refresh the page and try again")
            }
        </script>
    </body>
</html>
