<!DOCTYPE html>
<html>
    <head></head>
    <body>
        <h2>JavaScript String Conversion</h2>
        <p id="sum"></p>
        <p id="string"></p>

        <script>
            var a=70;
            var b=90;
            document.getElementById("sum").innerHTML=a+b;
            document.getElementById("string").innerHTML= String(a)+String(b)
        </script>
</html>
