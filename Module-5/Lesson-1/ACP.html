<!DOCTYPE html>
<html>
    <head></head>
    <body>
        <h2>JavaScript While Loops</h2>
        <p id="number"></p>
        
        <script>
            let text = "";
                let i = 51;
                while (i <= 100) {
                    text = text + i + "<br>"
                    i++;
                }
            document.getElementById("number").innerHTML=text;
        </script>
    </body>
</html>
