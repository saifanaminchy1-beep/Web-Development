<!DOCTYPE html>
<html>
    <head></head>
    <body>
        <p>Enter a number and then click on OK:</p>
        <input type="number" id="id" min="100" max="300" required>
        <button onclick="myFunction()">OK</button>
        <p>Note: If the number is less than 100 or greater than 300, an error message will be displayed.</p>
        <p id="result"></p>

        <script>
            function myFunction(){
                var inpobj=document.getElementById("id");
                if (!inpobj.checkValidity()){
                    document.getElementById("result").innerHTML=inpobj.validationMessage;
                    
                }
                else{
                    document.getElementById("result").innerHTML="Input is valid.";
                }
            }
        </script>
    </body>
</html>
