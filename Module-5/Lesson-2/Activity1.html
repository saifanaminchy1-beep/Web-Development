<!DOCTYPE html>
<html>
    <head></head>
    <body>
        <h2>JavaScript Classes</h2>
        <p id="student"></p>

        <script>
            class Student{
                constructor(name,year){
                    this.name=name;
                    this.year=year;
                }
                age(){
                    let date=new Date;
                    return date.getFullYear() - this.year;
                }
            }
            let student=new Student("Alisha",2000);
            document.getElementById("student").innerHTML=student.name + " is " + student.age() + " years old"
        </script>
    </body>
</html>
