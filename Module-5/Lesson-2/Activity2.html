<!DOCTYPE html>
<html>

<head></head>

<body>
    <h2>JavaScript Class Inheritence</h2>
    <p id="car"></p>

    <script>
        //Parent Class
        class Car {
            constructor(brand) {
                this.brand = brand;
            }
            present() {
                return 'I have a ' + this.brand;
            }
        }
        //Child Class
        class Model extends Car {
            constructor(brand, model) {
                super(brand);
                this.model = model;
            }
            show() {
                return this.present() + ', it is a ' + this.model + "."
            }
        }
        let car = new Model("Ford", "Mustang")
        document.getElementById("car").innerHTML = car.show();
    </script>
</body>

</html>
