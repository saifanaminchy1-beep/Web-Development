<!DOCTYPE html>
<html>
    <head></head>
    <body>
        <h2>JavaScript Classes</h2>
        <p id="student"></p>
        <p id ="shoes"></p>

        <script>
            class Student{
                constructor(name,year){
                    this.name=name;
                    this.year=year;
                }
                age(){
                    let date= new Date;
                    return date.getFullYear()- this.year;

                }

            }
            let student= new Student("Gabriel",1997);
            document.getElementById("student").innerHTML=student.name + " is " + student.age() + " years old";

            //Parent Class
                class Shoes {
                    constructor(brand) {
                        this.brand = brand;
                    }
                    present() {
                        return 'I have a ' + this.brand;
                    }
                }
                //Child Class
                class Model extends Shoes {
                    constructor(brand, model) {
                        super(brand);
                        this.model = model;
                    }
                    show() {
                        return this.present() + ', it is an ' + this.model + "."
                    }
                }
                let shoes = new Model("F50", "Adidas")
                document.getElementById("shoes").innerHTML = shoes.show();
        </script>
    </body>
</html>
