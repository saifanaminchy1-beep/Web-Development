<!DOCTYPE html>
<html>
    <head></head>
    <body>
        <h2>JavaSript Math Object</h2>

        <script>
            var random= Math.floor(Math.random()*100);
            document.write("Random number between 0 and 1:",random);
            var pi=Math.PI;
            document.write("<br>Value of pi: ",pi);
            var power=Math.pow(2,3);
            document.write("<br>2 raised to the power of 3:",power)
            var sqrt=Math.sqrt(16);
            document.write("<br>Sqaure root of 16: ",sqrt)


        </script>
    </body>
</html>
