<!DOCTYPE html>
<html>

<head></head>

<body>
    <h1>JavaScript Array</h1>
    <p id="array"></p>
    <p id="join"></p>
    <p id="pop"></p>
    <script>
        var fruits = ["Apple", "Banana", "Mango", "Grapes", "Cherry", "Kiwi"];
        //Accessing the 4th element (index 3) of the array
        document.getElementById("array").innerHTML = fruits[3];

        //Joining the array elements
        document.getElementById("join").innerHTML = fruits.join("*");

        //Removing the last element of the array
        fruits.pop();
        document.getElementById("pop").innerHTML = fruits;

    </script>
</body>

</html>
