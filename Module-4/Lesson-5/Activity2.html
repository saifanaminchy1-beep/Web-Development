<!DOCTYPE html>
<html>
    <head></head>
    <body>
        <h1>JavaScript Call Stack</h1>
        <p id="result"></p>
        <script>
            function add(a,b){
                return a+b
            };
            function avg(a,b){
                return add(a,b)/2
            };
            document.getElementById("result").innerHTML=avg(10,20)
            
        
        </script>
    </body>
</html>
