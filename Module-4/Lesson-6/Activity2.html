<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h2>Real-time validation using JS</h2>
    <hr>

    <div class="box">
        <form id="loginForm">
            <div class="row">
                <label>Email:</label>
                <input type="text" id="email" placeholder="myname@gmail.com">

            </div>
            <div class="row">
                <label>Password:</label>
                <input type="password" id="password" placeholder="..........">

            </div>
            <div class="row">
                <label>Age:</label>
                <input type="number" id="age">

            </div>
            <button type="submit">Login</button>
        </form>
    </div>
    <p id="message"></p>
</body>

</html>
