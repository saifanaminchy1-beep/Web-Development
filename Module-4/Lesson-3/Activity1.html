<!DOCTYPE html>
<html>

<head></head>

<body>
    <h1>JavaScript String Methods</h1>
    <script>
        var str = "AmAzInG";
        document.write("The string is:" + str + "<br>");
        //Convert the string to uppercase
        document.write("Uppercase:" + str.toUpperCase() + "<br>");
        //Convert the string to lowercase
        document.write("Lowercase:" + str.toLowerCase() + "<br>");
        //Check whether the string starts with Z
        document.write("Starts with Z:" + str.startsWith("Z"));

    </script>
</body>

</html>
