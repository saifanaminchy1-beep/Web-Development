<!DOCTYPE html>
<html>
    <head></head>
    <body>
        <h1>JavaScript Variables</h1>
        <p id="num1"></p>
        <p id="num2"></p>
        <p id="product"></p>
        <script>
            var num1=30;
            document.getElementById("num1").innerHTML="The first number is:"+num1;
            var num2=500;
            document.getElementById("num2").innerHTML="The second number is:"+num2;
            var product=num1*num2;
            document.getElementById("product").innerHTML="The product of the two numbers is:"+product;
        </script>
    </body>
</html>
